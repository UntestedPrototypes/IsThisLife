; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:controller]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
  -D ROLE_CONTROLLER
upload_port = COM3    ; replace with your port

[env:robot]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
  madhephaestus/ESP32Servo@3.1.3
  adafruit/Adafruit BNO055@^1.6.4
  adafruit/Adafruit INA219@^1.2.3
build_flags =  
  -D ROLE_ROBOT
  -D DEFAULT_ROBOT_ID=3        ; overridden per robot at build time (OR command: 'pio run -e robot -D ROBOT_ID=3')
upload_port = COM14    ; replace with your port

[env:testing]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
build_flags =  
  -D ROLE_TESTING
upload_port = COM3    ; replace with your port

[env:servo_id_changer]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
build_flags =  
  -D ROLE_ID_CHANGER
upload_port = COM3    ; replace with your port
